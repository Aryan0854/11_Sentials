<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinal - AI Cloud Security & Resource Command Center</title>
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#06070a] text-white min-h-screen font-sans antialiased selection:bg-purple-500 selection:text-white">
    <div id="app">
        <!-- Login Page -->
        <div id="loginPage" class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-4">
            <!-- Background Glows -->
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>

            <div class="max-w-md w-full relative z-10">
                <div class="bg-[#0d0e15]/80 backdrop-blur-xl border border-white/5 rounded-2xl shadow-2xl p-8 space-y-8">
                    <div class="text-center">
                        <div class="inline-flex p-4 bg-purple-500/10 border border-purple-500/20 rounded-2xl mb-4">
                            <svg class="h-12 w-12 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                        </div>
                        <h2 class="text-3xl font-extrabold text-white tracking-tight">Sentinal</h2>
                        <p id="loginSubtext" class="mt-2 text-sm text-gray-400">Sign in to your account</p>
                    </div>

                    <form id="loginForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300">Email address</label>
                            <input type="email" id="email" required class="mt-1 block w-full px-4 py-3 rounded-lg bg-gray-900/60 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all" placeholder="Enter your email">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300">Password</label>
                            <input type="password" id="password" required class="mt-1 block w-full px-4 py-3 rounded-lg bg-gray-900/60 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all" placeholder="Enter your password">
                        </div>
                        <button type="submit" class="w-full flex justify-center py-3 px-4 rounded-lg text-sm font-semibold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 shadow-lg shadow-purple-500/20 transform transition duration-200 hover:-translate-y-0.5">
                            Sign In
                        </button>
                    </form>

                    <div class="text-center">
                        <button id="toggleSignUp" class="text-sm text-purple-400 hover:text-purple-300 font-medium transition-colors">
                            Need an account? Sign up
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Page -->
        <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
            <!-- Header Nav -->
            <nav class="bg-[#0d0e15]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between h-16 items-center">
                        <div class="flex items-center">
                            <svg class="h-8 w-8 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            <span class="ml-2 text-xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Sentinal</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <a href="11_Sentials-main/index2.html" id="a" class="flex items-center px-4 py-2 text-sm font-medium text-white bg-white/[0.05] border border-white/10 rounded-lg hover:bg-white/[0.1] hover:border-purple-500/40 transition-all duration-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 12h14M12 5l7 7-7 7" />
                                </svg>                                 
                                Incidents Feed
                            </a>
                            
                            <button id="connectDbBtn" class="flex items-center px-4 py-2 text-sm font-medium text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 rounded-lg shadow-lg shadow-purple-500/10 hover:shadow-purple-500/25 transform transition duration-200 hover:-translate-y-0.5">
                                <svg class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
                                </svg>
                                Connect Database
                            </button>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Main Content Container -->
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow">
                <!-- Placeholder when Database is NOT connected -->
                <div id="noDbPlaceholder" class="flex flex-col items-center justify-center py-20 text-center bg-[#0d0e15]/40 backdrop-blur-md border border-white/5 rounded-2xl p-8 shadow-xl max-w-2xl mx-auto my-8">
                    <div class="p-4 bg-purple-500/10 border border-purple-500/20 rounded-2xl mb-6 text-purple-400">
                        <svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">No Connected Database</h2>
                    <p class="text-gray-400 max-w-md mb-8">Sentinel requires an active database connection to initialize monitoring telemetry, system stats, and resource diagnostics dashboards.</p>
                    <button onclick="document.getElementById('connectDbBtn').click()" class="flex items-center px-6 py-3 text-sm font-semibold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 rounded-lg shadow-lg shadow-purple-500/20 transform transition hover:-translate-y-0.5">
                        Connect Database to Start
                    </button>
                </div>

                <!-- Dashboard Content Container (Hidden by default) -->
                <div id="dashboardContent" class="hidden transition-opacity duration-500 opacity-0">
                    <!-- Metrics Card Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="metricsGrid">
                        <!-- Metrics cards will be dynamically inserted here by dashboard.js -->
                    </div>

                    <!-- Database Analytics Container -->
                    <div id="dbAnalyticsContainer" class="hidden mb-8 transition-all duration-500">
                        <!-- Connected DB stats will be rendered here dynamically -->
                    </div>

                    <!-- Iframes Grid -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <!-- System Monitoring & Analytics (Flask port 5000) -->
                        <div class="bg-[#0d0e15]/60 backdrop-blur-md border border-white/5 rounded-2xl overflow-hidden shadow-2xl flex flex-col h-[620px] hover:border-purple-500/20 transition-all duration-300">
                            <div class="px-6 py-4 bg-white/[0.02] border-b border-white/5 flex items-center justify-between">
                                <h3 class="text-md font-semibold text-white flex items-center">
                                    <span class="flex h-2 w-2 relative mr-3">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    Real-Time Monitoring
                                </h3>
                                <span class="text-xs text-purple-400 font-mono">Port 5000</span>
                            </div>
                            <div class="flex-1 min-h-0 bg-transparent">
                                <iframe src="http://127.0.0.1:5000" class="w-full h-full border-none"></iframe>
                            </div>
                        </div>

                        <!-- Resource Optimization & Control (Flask port 8080) -->
                        <div class="bg-[#0d0e15]/60 backdrop-blur-md border border-white/5 rounded-2xl overflow-hidden shadow-2xl flex flex-col h-[620px] hover:border-purple-500/20 transition-all duration-300">
                            <div class="px-6 py-4 bg-white/[0.02] border-b border-white/5 flex items-center justify-between">
                                <h3 class="text-md font-semibold text-white flex items-center">
                                    <svg class="h-5 w-5 text-purple-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                                    </svg>
                                    Resource Optimization & Diagnostics
                                </h3>
                                <span class="text-xs text-purple-400 font-mono">Port 8080</span>
                            </div>
                            <div class="flex-1 min-h-0 bg-transparent">
                                <iframe src="http://127.0.0.1:8080" class="w-full h-full border-none"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Button -->
            <button id="chatToggle" class="fixed bottom-8 right-8 p-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-full shadow-lg shadow-purple-500/20 hover:shadow-purple-500/40 transform transition-all duration-300 hover:-translate-y-1 z-40">
                <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </button>

            <!-- Chat Window -->
            <div id="chatWindow" class="hidden fixed bottom-24 right-8 w-96 bg-[#0d0e15]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50 transition-all duration-300">
                <!-- Chat content will be inserted here -->
            </div>
        </div>

        <!-- Database Connection Modal -->
        <div id="dbModal" class="hidden fixed inset-0 bg-[#06070a]/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <!-- Modal content will be inserted here by database.js -->
        </div>
    </div>

    <script src="js/main.js" type="module"></script>
</body>
</html>
